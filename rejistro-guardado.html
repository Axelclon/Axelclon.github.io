<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registros Guardados</title>
    <style>
        /* Estilos base */
        body {
            margin: 0;
            overflow-x: hidden;
            background: linear-gradient(135deg, #0a0015 0%, #1a0a2e 50%, #16213e 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
        }
        canvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: -1;
        }
        .ui-container {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            width: 100%;
        }
        .top-bar {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px 25px;
            width: 100%;
            box-sizing: border-box;
            flex-shrink: 0;
        }
        .top-bar h2 {
            color: #FF69B4;
            text-shadow: 0 0 10px rgba(255, 105, 180, 0.7);
        }
        .records-container {
            width: 100%;
            max-width: 700px;
            padding: 20px;
            box-sizing: border-box;
        }
        .record-card {
            background-color: rgba(255, 105, 180, 0.1);
            border: 1px solid rgba(255, 105, 180, 0.4);
            border-radius: 15px;
            margin-bottom: 20px;
            overflow: hidden;
            transition: all 0.4s ease;
            backdrop-filter: blur(10px);
        }
        .record-card.deleting {
            transform: scale(0.95);
            opacity: 0;
            margin-bottom: 0;
            padding-top: 0;
            padding-bottom: 0;
        }
        .record-card:hover {
            box-shadow: 0 0 20px rgba(255, 105, 180, 0.4);
            background-color: rgba(255, 105, 180, 0.15);
        }
        .card-header {
            padding: 20px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .card-header-title { font-size: 1.2rem; font-weight: bold; color: #fca9cb; }
        .card-header-date { font-size: 1rem; color: rgba(255, 255, 255, 0.8); }
        .card-body {
            max-height: 0;
            transition: max-height 0.5s ease-in-out, padding 0.5s ease-in-out;
            padding: 0 20px;
        }
        .record-card.active .card-body { max-height: 1000px; padding: 10px 20px 20px 20px; }
        .record-card.active .arrow-icon { transform: rotate(180deg); }
        .details-grid {
            border-top: 1px solid rgba(255, 105, 180, 0.3);
            padding-top: 15px;
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
        }
        @media (min-width: 600px) { .details-grid { grid-template-columns: 1fr 1fr; } }
        .detail-item { background: rgba(255, 105, 180, 0.1); padding: 10px 15px; border-radius: 8px; word-wrap: break-word; }
        .detail-item strong { display: block; color: #FF69B4; margin-bottom: 5px; font-size: 0.9rem; }
        .detail-item.full-width { grid-column: 1 / -1; }
        .card-icons { display: flex; align-items: center; gap: 15px; }
        .arrow-icon, .delete-icon { transition: transform 0.3s ease; }
        .arrow-icon { fill: #FF69B4; width: 24px; height: 24px; }
        .delete-icon { fill: #ff8a8a; width: 22px; height: 22px; cursor: pointer; }
        .delete-icon:hover { fill: #ff5252; transform: scale(1.15); }
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.7); display: flex; justify-content: center; align-items: center; z-index: 1000; opacity: 0; pointer-events: none; transition: opacity 0.3s ease; }
        .modal-overlay.visible { opacity: 1; pointer-events: auto; }
        .modal-content { background: linear-gradient(135deg, #1a0a2e 0%, #16213e 100%); padding: 30px; border-radius: 15px; border: 1px solid #FF69B4; box-shadow: 0 0 25px rgba(255, 105, 180, 0.5); text-align: center; width: 90%; max-width: 400px; transform: scale(0.9); transition: transform 0.3s ease; backdrop-filter: blur(10px); }
        .modal-overlay.visible .modal-content { transform: scale(1); }
        .modal-title { color: #FF69B4; font-size: 1.5rem; margin-top: 0; }
        .modal-message { margin: 20px 0; font-size: 1rem; line-height: 1.5; }
        .modal-buttons { display: flex; gap: 15px; justify-content: center; }
        .modal-btn { border: none; border-radius: 20px; padding: 10px 30px; cursor: pointer; font-weight: bold; }
        .modal-btn.primary { background-color: #ff8a8a; color: white; }
        .modal-btn.secondary { background-color: rgba(255, 105, 180, 0.3); color: white; }
    </style>
</head>
<body>
    <canvas id="feminine-canvas"></canvas>
    <div id="deleteModal" class="modal-overlay">
        <div class="modal-content">
            <h3 class="modal-title">Confirmar Eliminación</h3>
            <p class="modal-message">¿Estás segura de que quieres eliminar este registro? Esta acción no se puede deshacer.</p>
            <div class="modal-buttons">
                <button id="cancelDelete" class="modal-btn secondary">Cancelar</button>
                <button id="confirmDelete" class="modal-btn primary">Eliminar</button>
            </div>
        </div>
    </div>
    <div class="ui-container">
        <div class="top-bar">
            <h2>Mis Registros de Ciclo</h2>
        </div>
        <div class="records-container" id="recordsList">
            <!-- Las tarjetas se cargarán aquí desde Supabase -->
        </div>
    </div>
    
    <!-- Librerías JS -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            // --- CONEXIÓN A SUPABASE ---
            const SUPABASE_URL = 'https://wrtdzisgzsouqldbdhug.supabase.co';
            const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndydGR6aXNnenNvdXFsZGJkaHVnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDk4ODc5ODEsImV4cCI6MjA2NTQ2Mzk4MX0.rpbuwf-UKH23bcRkOwlENjJIbzVkthAibkkVSfkBixQ';
            const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

            // --- ELEMENTOS DEL DOM ---
            const recordsList = document.getElementById('recordsList');
            const deleteModal = document.getElementById('deleteModal');
            const confirmDeleteBtn = document.getElementById('confirmDelete');
            const cancelDeleteBtn = document.getElementById('cancelDelete');
            let cardToDelete = null;
            let recordIdToDelete = null;

            // --- FUNCIONES ---
            const showDeleteModal = (card, recordId) => {
                cardToDelete = card;
                recordIdToDelete = recordId;
                deleteModal.classList.add('visible');
            };
            const hideDeleteModal = () => {
                cardToDelete = null;
                recordIdToDelete = null;
                deleteModal.classList.remove('visible');
            };
            
            const formatDate = (dateString) => {
                if (!dateString) return 'N/A';
                const date = new Date(dateString);
                return new Intl.DateTimeFormat('es-ES', { day: '2-digit', month: '2-digit', year: 'numeric' }).format(date);
            };

            const fetchAndDisplayCycles = async (user) => {
                const { data, error } = await supabase
                    .from('cycles')
                    .select('*')
                    .eq('user_id', user.id);

                if (error) {
                    console.error('Error fetching cycles:', error);
                    recordsList.innerHTML = '<p style="text-align: center;">No se pudieron cargar los registros.</p>';
                    return;
                }

                if (data.length === 0) {
                    recordsList.innerHTML = '<p style="text-align: center;">Aún no tienes registros guardados.</p>';
                    return;
                }

                recordsList.innerHTML = '';
                data.forEach(record => {
                    const card = document.createElement('div');
                    card.className = 'record-card';
                    card.dataset.recordId = record.id;
                    
                    const formatBool = (value) => value ? 'Sí' : 'No';
                    const partners = Array.isArray(record.partner_gender) ? record.partner_gender.join(', ') : 'N/A';

                    card.innerHTML = `
                        <div class="card-header">
                            <div>
                                <div class="card-header-title">Ciclo de ${formatDate(record.start_date)}</div>
                                <div class="card-header-date">Inicio: ${formatDate(record.start_date)}</div>
                            </div>
                            <div class="card-icons">
                                <svg class="arrow-icon" viewBox="0 0 24 24"><path d="M7.41 8.59L12 13.17l4.59-4.58L18 10l-6 6-6-6z"/></svg>
                                <svg class="delete-icon" viewBox="0 0 24 24"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg>
                            </div>
                        </div>
                        <div class="card-body">
                            <div class="details-grid">
                                <div class="detail-item"><strong>Finalización:</strong> ${formatDate(record.end_date)}</div>
                                <div class="detail-item"><strong>Flujo:</strong> ${record.flow_type || 'N/A'}</div>
                                <div class="detail-item"><strong>Protección:</strong> ${record.protection_method || 'N/A'}</div>
                                <div class="detail-item"><strong>Rel. Sexuales Recientes:</strong> ${formatBool(record.had_sex)}</div>
                                ${record.had_sex ? `
                                    <div class="detail-item"><strong>Última Relación:</strong> ${formatDate(record.last_sex_date)}</div>
                                    <div class="detail-item"><strong>Nº de Parejas:</strong> ${record.partner_count || 'N/A'}</div>
                                    <div class="detail-item"><strong>Sexo de Pareja(s):</strong> ${partners}</div>
                                ` : ''}
                                <div class="detail-item"><strong>Sospecha de Infección:</strong> ${formatBool(record.has_infection_symptoms)}</div>
                                ${record.has_infection_symptoms ? `
                                    <div class="detail-item full-width"><strong>Síntomas/Tratamiento:</strong> ${record.infection_symptoms || 'Sin detalles'}</div>
                                ` : ''}
                                <div class="detail-item full-width"><strong>Observaciones:</strong> ${record.observations || 'Sin observaciones'}</div>
                            </div>
                        </div>
                    `;
                    recordsList.appendChild(card);
                });
            };
            
            // --- MANEJADORES DE EVENTOS ---
            confirmDeleteBtn.addEventListener('click', async () => {
                if (cardToDelete && recordIdToDelete) {
                    const { error } = await supabase
                        .from('cycles')
                        .delete()
                        .eq('id', recordIdToDelete);

                    if (error) {
                        alert('Error al eliminar el registro: ' + error.message);
                    } else {
                        cardToDelete.classList.add('deleting');
                        setTimeout(() => cardToDelete.remove(), 400);
                    }
                }
                hideDeleteModal();
            });
            cancelDeleteBtn.addEventListener('click', hideDeleteModal);
            recordsList.addEventListener('click', (event) => {
                const deleteIcon = event.target.closest('.delete-icon');
                const header = event.target.closest('.card-header');
                if (deleteIcon) {
                    event.stopPropagation();
                    const card = deleteIcon.closest('.record-card');
                    showDeleteModal(card, card.dataset.recordId);
                    return;
                }
                if (header) {
                    header.parentElement.classList.toggle('active');
                }
            });

            // --- CARGA INICIAL ---
            const { data: { user } } = await supabase.auth.getUser();
            if (user) {
                fetchAndDisplayCycles(user);
            } else {
                recordsList.innerHTML = '<p style="text-align: center;">Por favor, <a href="menu.html" style="color: #FF69B4;">inicia sesión</a> para ver tus registros.</p>';
            }
        });
        
        // --- Efecto de partículas femeninas ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 5;
        
        const renderer = new THREE.WebGLRenderer({ 
            canvas: document.getElementById('feminine-canvas'), 
            alpha: true 
        });
        renderer.setSize(window.innerWidth, window.innerHeight);
        
        // Crear texturas para diferentes tipos de partículas
        function createPetalTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = canvas.height = 64;
            const ctx = canvas.getContext('2d');
            
            const gradient = ctx.createRadialGradient(32, 32, 0, 32, 32, 32);
            gradient.addColorStop(0, 'rgba(255, 105, 180, 0.8)');
            gradient.addColorStop(0.4, 'rgba(255, 182, 193, 0.6)');
            gradient.addColorStop(0.7, 'rgba(221, 160, 221, 0.3)');
            gradient.addColorStop(1, 'rgba(255, 105, 180, 0)');
            
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, 64, 64);
            
            return new THREE.CanvasTexture(canvas);
        }
        
        function createBubbleTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = canvas.height = 32;
            const ctx = canvas.getContext('2d');
            
            const gradient = ctx.createRadialGradient(16, 16, 0, 16, 16, 16);
            gradient.addColorStop(0, 'rgba(255, 192, 203, 0.9)');
            gradient.addColorStop(0.5, 'rgba(230, 230, 250, 0.5)');
            gradient.addColorStop(1, 'rgba(255, 255, 255, 0)');
            
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, 32, 32);
            
            return new THREE.CanvasTexture(canvas);
        }
        
        function createHeartTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = canvas.height = 32;
            const ctx = canvas.getContext('2d');
            
            ctx.fillStyle = 'rgba(255, 105, 180, 0.7)';
            ctx.beginPath();
            const x = 16, y = 12, width = 12, height = 12;
            ctx.moveTo(x, y + height / 4);
            ctx.quadraticCurveTo(x, y, x + width / 4, y);
            ctx.quadraticCurveTo(x + width / 2, y, x + width / 2, y + height / 4);
            ctx.quadraticCurveTo(x + width / 2, y, x + width * 3/4, y);
            ctx.quadraticCurveTo(x + width, y, x + width, y + height / 4);
            ctx.quadraticCurveTo(x + width, y + height / 2, x + width * 3/4, y + height * 3/4);
            ctx.lineTo(x + width / 2, y + height);
            ctx.lineTo(x + width / 4, y + height * 3/4);
            ctx.quadraticCurveTo(x, y + height / 2, x, y + height / 4);
            ctx.fill();
            
            return new THREE.CanvasTexture(canvas);
        }
        
        // Crear sistemas de partículas
        const petalCount = 300;
        const bubbleCount = 150;
        const heartCount = 50;
        
        // Pétalos
        const petalGeometry = new THREE.BufferGeometry();
        const petalPositions = [];
        const petalVelocities = [];
        
        for (let i = 0; i < petalCount; i++) {
            petalPositions.push(
                (Math.random() - 0.5) * 100,
                (Math.random() - 0.5) * 100,
                (Math.random() - 0.5) * 100
            );
            petalVelocities.push(
                (Math.random() - 0.5) * 0.02,
                Math.random() * 0.01 + 0.005,
                (Math.random() - 0.5) * 0.02
            );
        }
        
        petalGeometry.setAttribute('position', new THREE.Float32BufferAttribute(petalPositions, 3));
        const petalMaterial = new THREE.PointsMaterial({
            size: 3,
            map: createPetalTexture(),
            transparent: true,
            blending: THREE.AdditiveBlending
        });
        const petals = new THREE.Points(petalGeometry, petalMaterial);
        scene.add(petals);
        
        // Burbujas
        const bubbleGeometry = new THREE.BufferGeometry();
        const bubblePositions = [];
        const bubbleVelocities = [];
        
        for (let i = 0; i < bubbleCount; i++) {
            bubblePositions.push(
                (Math.random() - 0.5) * 80,
                (Math.random() - 0.5) * 80,
                (Math.random() - 0.5) * 80
            );
            bubbleVelocities.push(
                (Math.random() - 0.5) * 0.015,
                Math.random() * 0.008 + 0.003,
                (Math.random() - 0.5) * 0.015
            );
        }
        
        bubbleGeometry.setAttribute('position', new THREE.Float32BufferAttribute(bubblePositions, 3));
        const bubbleMaterial = new THREE.PointsMaterial({
            size: 2,
            map: createBubbleTexture(),
            transparent: true,
            blending: THREE.NormalBlending
        });
        const bubbles = new THREE.Points(bubbleGeometry, bubbleMaterial);
        scene.add(bubbles);
        
        // Corazones
        const heartGeometry = new THREE.BufferGeometry();
        const heartPositions = [];
        const heartVelocities = [];
        
        for (let i = 0; i < heartCount; i++) {
            heartPositions.push(
                (Math.random() - 0.5) * 60,
                (Math.random() - 0.5) * 60,
                (Math.random() - 0.5) * 60
            );
            heartVelocities.push(
                (Math.random() - 0.5) * 0.01,
                Math.random() * 0.005 + 0.002,
                (Math.random() - 0.5) * 0.01
            );
        }
        
        heartGeometry.setAttribute('position', new THREE.Float32BufferAttribute(heartPositions, 3));
        const heartMaterial = new THREE.PointsMaterial({
            size: 4,
            map: createHeartTexture(),
            transparent: true,
            blending: THREE.AdditiveBlending
        });
        const hearts = new THREE.Points(heartGeometry, heartMaterial);
        scene.add(hearts);
        
        // Animación
        let time = 0;
        function animate() {
            requestAnimationFrame(animate);
            time += 0.01;
            
            // Animar pétalos
            const petalPos = petals.geometry.attributes.position.array;
            for (let i = 0; i < petalCount; i++) {
                const i3 = i * 3;
                petalPos[i3] += petalVelocities[i3] + Math.sin(time + i) * 0.001;
                petalPos[i3 + 1] += petalVelocities[i3 + 1];
                petalPos[i3 + 2] += petalVelocities[i3 + 2] + Math.cos(time + i) * 0.001;
                
                if (petalPos[i3 + 1] > 50) petalPos[i3 + 1] = -50;
                if (Math.abs(petalPos[i3]) > 50) petalVelocities[i3] *= -1;
                if (Math.abs(petalPos[i3 + 2]) > 50) petalVelocities[i3 + 2] *= -1;
            }
            petals.geometry.attributes.position.needsUpdate = true;
            
            // Animar burbujas
            const bubblePos = bubbles.geometry.attributes.position.array;
            for (let i = 0; i < bubbleCount; i++) {
                const i3 = i * 3;
                bubblePos[i3] += bubbleVelocities[i3];
                bubblePos[i3 + 1] += bubbleVelocities[i3 + 1];
                bubblePos[i3 + 2] += bubbleVelocities[i3 + 2];
                
                if (bubblePos[i3 + 1] > 40) bubblePos[i3 + 1] = -40;
                if (Math.abs(bubblePos[i3]) > 40) bubbleVelocities[i3] *= -1;
                if (Math.abs(bubblePos[i3 + 2]) > 40) bubbleVelocities[i3 + 2] *= -1;
            }
            bubbles.geometry.attributes.position.needsUpdate = true;
            
            // Animar corazones
            const heartPos = hearts.geometry.attributes.position.array;
            for (let i = 0; i < heartCount; i++) {
                const i3 = i * 3;
                heartPos[i3] += heartVelocities[i3] + Math.sin(time * 2 + i) * 0.002;
                heartPos[i3 + 1] += heartVelocities[i3 + 1];
                heartPos[i3 + 2] += heartVelocities[i3 + 2];
                
                if (heartPos[i3 + 1] > 30) heartPos[i3 + 1] = -30;
                if (Math.abs(heartPos[i3]) > 30) heartVelocities[i3] *= -1;
                if (Math.abs(heartPos[i3 + 2]) > 30) heartVelocities[i3 + 2] *= -1;
            }
            hearts.geometry.attributes.position.needsUpdate = true;
            
            // Rotación suave de toda la escena
            scene.rotation.y += 0.0005;
            
            renderer.render(scene, camera);
        }
        
        // Redimensionar
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
        
        animate();
    </script>
</body>
</html>
