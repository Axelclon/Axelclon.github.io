<!DOCTYPE html>
<html lang="es">
<head>

    <!-- Tus estilos y librerías se mantienen, son perfectos -->

    <style>
        /* Tu CSS está perfecto, no se ha modificado. */
        body { font-family: 'Poppins', sans-serif; background: linear-gradient(145deg, #fdf2f8 0%, #fce7f3 30%, #fbcfe8 60%, #f9a8d4 100%); min-height: 100vh; position: relative; overflow-x: hidden; }

        .heart { position: absolute; color: rgba(236, 72, 153, 0.3); animation: floatHeart 8s linear infinite; }
        .heart:nth-child(1) { left: 10%; animation-delay: 0s; font-size: 12px; }
        .heart:nth-child(2) { left: 25%; animation-delay: 2s; font-size: 16px; }
        .heart:nth-child(3) { left: 40%; animation-delay: 4s; font-size: 10px; }
        .heart:nth-child(4) { left: 60%; animation-delay: 1s; font-size: 14px; }
        .heart:nth-child(5) { left: 80%; animation-delay: 3s; font-size: 12px; }
        .heart:nth-child(6) { left: 90%; animation-delay: 5s; font-size: 18px; }
        @keyframes floatHeart { 0% { transform: translateY(100vh) rotate(0deg); opacity: 0; } 10% { opacity: 1; } 90% { opacity: 1; } 100% { transform: translateY(-20px) rotate(360deg); opacity: 0; } }
        .wave-bg { position: fixed; bottom: 0; left: 0; width: 100%; height: 100px; background: linear-gradient(45deg, rgba(236, 72, 153, 0.1), rgba(244, 114, 182, 0.1)); clip-path: ellipse(100% 100% at 50% 100%); animation: waveMove 6s ease-in-out infinite; z-index: 1; }

        @keyframes titleGlow { 0%, 100% { filter: brightness(1); } 50% { filter: brightness(1.2); } }
        .main-container { position: relative; z-index: 10; padding: 1rem; min-height: 100vh; }
        .form-glass { background: rgba(255, 255, 255, 0.25); backdrop-filter: blur(20px); border: 1px solid rgba(236, 72, 153, 0.2); border-radius: 2rem; box-shadow: 0 8px 32px rgba(236, 72, 153, 0.1); }
        .input-pink { background: rgba(255, 255, 255, 0.8); border: 2px solid rgba(236, 72, 153, 0.3); border-radius: 1.5rem; transition: all 0.3s ease; font-size: 16px; }
        .input-pink:focus { border-color: #ec4899; box-shadow: 0 0 0 3px rgba(236, 72, 153, 0.1); transform: translateY(-1px); }
        .btn-pink { background: linear-gradient(135deg, #ec4899, #f472b6); color: white; border-radius: 2rem; font-weight: 600; transition: all 0.3s ease; box-shadow: 0 4px 15px rgba(236, 72, 153, 0.3); position: relative; overflow: hidden; }
        .btn-pink:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(236, 72, 153, 0.4); }
        .btn-pink::before { content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%; background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent); transition: left 0.5s ease; }
        .btn-pink:active::before { left: 100%; }
        .btn-outline-pink { border: 2px solid #ec4899; color: #ec4899; border-radius: 2rem; font-weight: 600; transition: all 0.3s ease; }
        .btn-outline-pink:hover { background: #ec4899; color: white; transform: translateY(-2px); }
        .radio-pink { accent-color: #ec4899; transform: scale(1.2); }
        .conditional-section { border-left: 3px solid #ec4899; background: linear-gradient(90deg, rgba(236, 72, 153, 0.05), transparent); border-radius: 0 1rem 1rem 0; animation: slideInLeft 0.5s ease-out; }
        @keyframes slideInLeft { from { opacity: 0; transform: translateX(-20px); } to { opacity: 1; transform: translateX(0); } }
        .modal-pink { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(20px); border: 1px solid rgba(236, 72, 153, 0.3); border-radius: 2rem; box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1); }
        .section-icon { background: linear-gradient(135deg, #ec4899, #f472b6); color: white; border-radius: 50%; width: 2.5rem; height: 2.5rem; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 15px rgba(236, 72, 153, 0.3); }
        .fade-in-up { animation: fadeInUp 0.6s ease-out forwards; opacity: 0; transform: translateY(30px); }
        .fade-in-up:nth-child(1) { animation-delay: 0.1s; } .fade-in-up:nth-child(2) { animation-delay: 0.2s; } .fade-in-up:nth-child(3) { animation-delay: 0.3s; }
        @keyframes fadeInUp { to { opacity: 1; transform: translateY(0); } }
        @media (max-width: 640px) { .heart { display: none; } .input-pink { font-size: 16px; } }
        .loading { opacity: 0.7; pointer-events: none; }
        .loading::after { content: ''; position: absolute; top: 50%; left: 50%; width: 20px; height: 20px; margin: -10px 0 0 -10px; border: 2px solid #ec4899; border-top: 2px solid transparent; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>

                <div id="sustancias-details" class="conditional-section p-4 space-y-4 hidden"> <label class="block text-pink-700 font-medium text-sm mb-3">Marca las que consumes:</label> <div class="grid grid-cols-2 gap-3"> <label class="flex items-center space-x-2 cursor-pointer"> <input type="checkbox" name="sustancia" value="marihuana" class="radio-pink"> <span class="text-gray-700 text-sm">Marihuana</span> </label> <label class="flex items-center space-x-2 cursor-pointer"> <input type="checkbox" name="sustancia" value="hongos" class="radio-pink"> <span class="text-gray-700 text-sm">Hongos</span> </label> <label class="flex items-center space-x-2 cursor-pointer"> <input type="checkbox" name="sustancia" value="lsd" class="radio-pink"> <span class="text-gray-700 text-sm">LSD</span> </label> <label class="flex items-center space-x-2 cursor-pointer"> <input type="checkbox" name="sustancia" value="mdma" class="radio-pink"> <span class="text-gray-700 text-sm">MDMA</span> </label> <label class="flex items-center space-x-2 cursor-pointer"> <input type="checkbox" name="sustancia" value="cocaina" class="radio-pink"> <span class="text-gray-700 text-sm">Cocaína</span> </label> <label class="flex items-center space-x-2 cursor-pointer"> <input type="checkbox" name="sustancia" value="ketamina" class="radio-pink"> <span class="text-gray-700 text-sm">Ketamina</span> </label> <label class="flex items-center space-x-2 cursor-pointer col-span-2"> <input type="checkbox" name="sustancia" value="ayahuasca" class="radio-pink"> <span class="text-gray-700 text-sm">Ayahuasca</span> </label> </div> </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <!-- ======================================================== -->
    <!-- SCRIPT REVISADO, MEJORADO Y A PRUEBA DE ERRORES -->
    <!-- ======================================================== -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {

            // --- 1. CONFIGURACIÓN Y ELEMENTOS ---
            const SUPABASE_URL = 'https://wrtdzisgzsouqldbdhug.supabase.co';
            const SUPABASE_ANON_KEY = 'eyJhbGciOiJIZ1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndydGR6aXNnenNvdXFsZGJkaHVnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDk4ODc5ODEsImV4cCI6MjA2NTQ2Mzk4MX0.rpbuwf-UKH23bcRkOwlENjJIbzVkthAibkkVSfkBixQ';
            const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

            const ui = {
                form: document.getElementById('personalInfoForm'),
                itsDetails: document.getElementById('its-details'),
                sustanciasDetails: document.getElementById('sustancias-details'),
                modal: document.getElementById('messageModal'),
                modalTitle: document.getElementById('modalTitle'),
                modalMessage: document.getElementById('modalMessage'),
                modalIcon: document.getElementById('modalIcon'),
                modalCloseBtn: document.getElementById('modalClose'),
                emailField: document.getElementById('email'),
                passwordField: document.getElementById('password'),
                cancelButton: document.getElementById('cancelButton'),
            };

            // --- 2. FUNCIONES DE UI ---
            const showMessage = (title, message, isError = false) => {
                ui.modalTitle.textContent = title;
                ui.modalMessage.textContent = message;
                ui.modalIcon.className = isError ? 'fas fa-exclamation-triangle' : 'fas fa-heart';
                ui.modal.classList.remove('opacity-0', 'invisible');
                ui.modal.querySelector('.modal-pink').classList.remove('scale-75');
            };
            const hideMessage = () => {
                ui.modal.classList.add('opacity-0', 'invisible');
                ui.modal.querySelector('.modal-pink').classList.add('scale-75');
            };
            const setLoading = (isLoading) => ui.form.classList.toggle('loading', isLoading);

            // --- 3. LÓGICA DE LA APLICACIÓN ---

            /**
             * Carga datos del perfil en el formulario.
             */
            const loadUserProfile = async (user) => {
                const { data: profile, error } = await supabase.from('profiles').select('*').eq('id', user.id).single();
                
                if (error && error.code !== 'PGRST116') { // PGRST116 es el error "no rows found", que es normal para un usuario nuevo
                    throw new Error("No se pudo cargar tu perfil. Revisa tus Políticas de Seguridad (RLS) en Supabase. Error: " + error.message);
                }
                
                ui.emailField.value = user.email || '';
                
                if (profile) {
                    document.getElementById('age').value = profile.age || '';
                    document.querySelector('input[name="its"][value="' + (profile.has_its ? 'si' : 'no') + '"]').checked = true;
                    document.querySelector('input[name="pareja"][value="' + (profile.has_partner ? 'si' : 'no') + '"]').checked = true;
                    document.querySelector('input[name="hijos"][value="' + (profile.has_children ? 'si' : 'no') + '"]').checked = true;
                    document.querySelector('input[name="sustancias"][value="' + (profile.uses_substances ? 'si' : 'no') + '"]').checked = true;
                    document.querySelector('input[name="trabajo-sexual"][value="' + (profile.is_sex_worker ? 'si' : 'no') + '"]').checked = true;
                    document.querySelector('input[name="licor"][value="' + (profile.drinks_liquor ? 'si' : 'no') + '"]').checked = true;
                    document.querySelector('input[name="aborto"][value="' + (profile.had_abortion ? 'si' : 'no') + '"]').checked = true;
                    document.querySelector('input[name="legrado"][value="' + (profile.had_curettage ? 'si' : 'no') + '"]').checked = true;

                    if (profile.has_its) {
                        ui.itsDetails.classList.remove('hidden');
                        document.getElementById('its-type').value = profile.its_type || '';
                        document.getElementById('its-medication').value = profile.its_medication || '';
                    }
                    if (profile.uses_substances && Array.isArray(profile.substances_used)) {
                        ui.sustanciasDetails.classList.remove('hidden');
                        profile.substances_used.forEach(sustancia => {
                            const checkbox = document.querySelector(`input[name="sustancia"][value="${sustancia}"]`);
                            if (checkbox) checkbox.checked = true;
                        });
                    }
                }
                 // Disparamos un evento 'change' para que las secciones condicionales se actualicen al cargar
                ui.form.dispatchEvent(new Event('change'));
            };

            /**
             * Guarda los cambios del formulario en Supabase.
             */
            const handleFormSubmit = async (event) => {
                event.preventDefault();
                setLoading(true);

                try {
                    const { data: { user } } = await supabase.auth.getUser();
                    if (!user) throw new Error('Tu sesión ha expirado. Por favor, inicia sesión de nuevo.');

                    const ageValue = document.getElementById('age').value;
                    const updates = {
                        id: user.id,
                        age: ageValue ? parseInt(ageValue, 10) : null,
                        has_its: document.querySelector('input[name="its"]:checked').value === 'si',
                        its_type: document.querySelector('input[name="its"]:checked').value === 'si' ? document.getElementById('its-type').value : null,
                        its_medication: document.querySelector('input[name="its"]:checked').value === 'si' ? document.getElementById('its-medication').value : null,
                        has_partner: document.querySelector('input[name="pareja"]:checked').value === 'si',
                        has_children: document.querySelector('input[name="hijos"]:checked').value === 'si',
                        uses_substances: document.querySelector('input[name="sustancias"]:checked').value === 'si',
                        substances_used: Array.from(document.querySelectorAll('input[name="sustancia"]:checked')).map(el => el.value),
                        is_sex_worker: document.querySelector('input[name="trabajo-sexual"]:checked').value === 'si',
                        drinks_liquor: document.querySelector('input[name="licor"]:checked').value === 'si',
                        had_abortion: document.querySelector('input[name="aborto"]:checked').value === 'si',
                        had_curettage: document.querySelector('input[name="legrado"]:checked').value === 'si',
                        updated_at: new Date().toISOString(),
                    };

                    const { error } = await supabase.from('profiles').upsert(updates, { onConflict: 'id' });
                    if (error) throw error;
                    
                    if (ui.passwordField.value) {
                        const { error: passwordError } = await supabase.auth.updateUser({ password: ui.passwordField.value });
                        if (passwordError) throw new Error("Datos guardados, pero falló al actualizar contraseña: " + passwordError.message);
                    }
                    
                    showMessage('¡Perfecto! 💕', 'Tu información ha sido actualizada. Serás redirigida en un momento.');
                    setTimeout(() => {
                        window.location.href = 'visor-de-perfil.html'; // Cambia 'visor-de-perfil.html' al nombre de tu página de visualización
                    }, 2500);

                } catch (error) {
                    showMessage('Error al Guardar', error.message, true);
                } finally {
                    setLoading(false);
                }
            };

            // --- 4. INICIALIZACIÓN ---
            const initializePage = async () => {
                ui.modalCloseBtn.addEventListener('click', hideMessage);
                ui.cancelButton.addEventListener('click', () => window.history.back());
                ui.form.addEventListener('submit', handleFormSubmit);
                ui.form.addEventListener('change', (e) => {
                    if (e.target.type === 'radio') {
                        if (e.target.name === 'its') ui.itsDetails.classList.toggle('hidden', e.target.value === 'no');
                        if (e.target.name === 'sustancias') ui.sustanciasDetails.classList.toggle('hidden', e.target.value === 'no');
                    }
                });

                try {
                    setLoading(true);
                    const { data: { user } } = await supabase.auth.getUser();
                    if (user) {
                        await loadUserProfile(user);
                    } else {
                        showMessage('Error de Sesión', 'Debes iniciar sesión para editar tu información.', true);
                        ui.form.classList.add('opacity-50', 'pointer-events-none');
                    }
                } catch (error) {
                    showMessage('Error Crítico', 'No se pudo verificar tu sesión: ' + error.message, true);
                } finally {
                    setLoading(false);
                }
            };

            initializePage();
        });
    </script>
</body>
</html>
