<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendario de Ciclos</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #ffeef8 0%, #f8e8ff 25%, #ffe0f0 50%, #fff0f8 75%, #fdf2f8 100%);
            min-height: 100vh;
            color: #4a4a4a;
            position: relative;
            overflow-x: hidden;
        }

        /* Decorative elements */
        body::before {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 20% 20%, rgba(255, 182, 193, 0.1) 0%, transparent 50%),
                        radial-gradient(circle at 80% 80%, rgba(255, 105, 180, 0.1) 0%, transparent 50%),
                        radial-gradient(circle at 40% 60%, rgba(255, 192, 203, 0.08) 0%, transparent 50%);
            animation: floatBackground 20s ease-in-out infinite;
            z-index: -1;
        }

        @keyframes floatBackground {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            33% { transform: translate(30px, -30px) rotate(1deg); }
            66% { transform: translate(-20px, 20px) rotate(-1deg); }
        }

        .ui-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            width: 100%;
            padding: 20px;
        }

        .top-bar {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 30px 25px;
            width: 100%;
            max-width: 900px;
            position: relative;
        }

        .top-bar::before {
            content: '🌸';
            position: absolute;
            left: 0;
            font-size: 2rem;
            animation: pulse 2s ease-in-out infinite;
        }

        .top-bar::after {
            content: '🌸';
            position: absolute;
            right: 0;
            font-size: 2rem;
            animation: pulse 2s ease-in-out infinite reverse;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.7; }
            50% { transform: scale(1.1); opacity: 1; }
        }

        .top-bar h2 {
            color: #d63384;
            font-weight: 600;
            font-size: 2.2rem;
            text-align: center;
            position: relative;
            text-shadow: 0 2px 4px rgba(214, 51, 132, 0.2);
        }

        .calendar-container {
            width: 100%;
            max-width: 900px;
            padding: 20px;
        }

        .calendar {
            background: rgba(255, 255, 255, 0.9);
            border: 2px solid rgba(255, 182, 193, 0.3);
            padding: 35px;
            border-radius: 25px;
            box-shadow: 0 15px 35px rgba(255, 105, 180, 0.15);
            backdrop-filter: blur(10px);
            position: relative;
            overflow: hidden;
        }

        .calendar::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #ff69b4, #ff1493, #ff69b4);
            border-radius: 25px 25px 0 0;
        }

        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding: 0 10px;
        }

        .calendar-header button {
            background: linear-gradient(135deg, #ff69b4, #ff1493);
            border: none;
            color: white;
            cursor: pointer;
            font-size: 1.2rem;
            border-radius: 50%;
            width: 45px;
            height: 45px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(255, 105, 180, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .calendar-header button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 105, 180, 0.4);
        }

        .calendar-header button:active {
            transform: translateY(0);
        }

        #monthYear {
            font-size: 1.8rem;
            font-weight: 600;
            color: #d63384;
            text-align: center;
            position: relative;
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 8px;
        }

        .weekday {
            text-align: center;
            padding: 15px 5px;
            font-weight: 600;
            color: #d63384;
            background: linear-gradient(135deg, rgba(255, 182, 193, 0.2), rgba(255, 105, 180, 0.1));
            border-radius: 12px;
            font-size: 0.9rem;
            letter-spacing: 0.5px;
        }

        .calendar-day {
            background: rgba(255, 255, 255, 0.7);
            border: 1px solid rgba(255, 182, 193, 0.2);
            border-radius: 12px;
            min-height: 50px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 500;
            position: relative;
            overflow: hidden;
        }

        .calendar-day:hover {
            background: rgba(255, 182, 193, 0.3);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(255, 105, 180, 0.2);
        }

        .calendar-day.other-month {
            color: rgba(150, 150, 150, 0.5);
            background: rgba(248, 248, 248, 0.5);
        }

        .calendar-day.period {
            background: linear-gradient(135deg, #ff69b4, #ff1493);
            color: white;
            font-weight: 600;
            border: 2px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 4px 15px rgba(255, 105, 180, 0.4);
            position: relative;
        }

        .calendar-day.period::before {
            content: '🌺';
            position: absolute;
            top: 2px;
            right: 2px;
            font-size: 0.7rem;
            opacity: 0.8;
        }

        .calendar-day.period:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(255, 105, 180, 0.5);
        }

        /* Decorative flowers */
        .flower-decoration {
            position: absolute;
            font-size: 1.5rem;
            opacity: 0.1;
            animation: float 6s ease-in-out infinite;
            pointer-events: none;
        }

        .flower-decoration:nth-child(1) {
            top: 10%;
            left: 5%;
            animation-delay: 0s;
        }

        .flower-decoration:nth-child(2) {
            top: 20%;
            right: 10%;
            animation-delay: 2s;
        }

        .flower-decoration:nth-child(3) {
            bottom: 15%;
            left: 8%;
            animation-delay: 4s;
        }

        .flower-decoration:nth-child(4) {
            bottom: 25%;
            right: 5%;
            animation-delay: 1s;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(5deg); }
        }

        /* Responsive design */
        @media (max-width: 768px) {
            .calendar {
                padding: 25px 20px;
            }
            
            .top-bar h2 {
                font-size: 1.8rem;
            }
            
            .calendar-day {
                min-height: 40px;
                font-size: 0.9rem;
            }
            
            .weekday {
                padding: 10px 5px;
                font-size: 0.8rem;
            }
            
            #monthYear {
                font-size: 1.5rem;
            }
        }

        /* Loading state */
        .loading {
            text-align: center;
            color: #d63384;
            font-weight: 500;
            grid-column: 1 / -1;
            padding: 20px;
        }

        .loading i {
            animation: spin 1s linear infinite;
            margin-right: 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Login prompt styling */
        .login-prompt {
            grid-column: 1 / -1;
            text-align: center;
            padding: 30px;
            background: linear-gradient(135deg, rgba(255, 182, 193, 0.1), rgba(255, 105, 180, 0.05));
            border-radius: 15px;
            border: 2px dashed rgba(255, 105, 180, 0.3);
        }

        .login-prompt a {
            color: #d63384;
            text-decoration: none;
            font-weight: 600;
            border-bottom: 2px solid transparent;
            transition: border-bottom-color 0.3s ease;
        }

        .login-prompt a:hover {
            border-bottom-color: #d63384;
        }
    </style>
</head>
<body>
    <!-- Decorative flowers -->
    <div class="flower-decoration">🌸</div>
    <div class="flower-decoration">🌺</div>
    <div class="flower-decoration">🌷</div>
    <div class="flower-decoration">💐</div>

    <div class="ui-container">
        <div class="top-bar">
            <h2><i class="fas fa-calendar-heart" style="margin-right: 15px; color: #ff69b4;"></i>Calendario de Ciclos</h2>
        </div>
        <div class="calendar-container">
            <div class="calendar">
                <div class="calendar-header">
                    <button id="prevMonth"><i class="fas fa-chevron-left"></i></button>
                    <h3 id="monthYear"></h3>
                    <button id="nextMonth"><i class="fas fa-chevron-right"></i></button>
                </div>
                <div class="calendar-grid" id="weekdays"></div>
                <div class="calendar-grid" id="calendarDays"></div>
            </div>
        </div>
    </div>
    
    <!-- Librerías JS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            // --- CONEXIÓN A SUPABASE ---
            const SUPABASE_URL = 'https://wrtdzisgzsouqldbdhug.supabase.co';
            const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndydGR6aXNnenNvdXFsZGJkaHVnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDk4ODc5ODEsImV4cCI6MjA2NTQ2Mzk4MX0.rpbuwf-UKH23bcRkOwlENjJIbzVkthAibkkVSfkBixQ';
            const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

            // --- ELEMENTOS DEL DOM DEL CALENDARIO ---
            const monthYearEl = document.getElementById('monthYear');
            const weekdaysEl = document.getElementById('weekdays');
            const calendarDaysEl = document.getElementById('calendarDays');
            const prevMonthBtn = document.getElementById('prevMonth');
            const nextMonthBtn = document.getElementById('nextMonth');

            let currentDate = new Date();
            let periodRanges = [];

            // Mostrar estado de carga
            const showLoading = () => {
                calendarDaysEl.innerHTML = '<div class="loading"><i class="fas fa-spinner"></i>Cargando tu calendario...</div>';
            };

            // --- LÓGICA DEL CALENDARIO ---
            const renderCalendar = () => {
                const month = currentDate.getMonth();
                const year = currentDate.getFullYear();

                monthYearEl.innerHTML = `<i class="fas fa-flower" style="margin-right: 10px; color: #ff69b4; font-size: 0.8em;"></i>${new Intl.DateTimeFormat('es-ES', { month: 'long', year: 'numeric' }).format(currentDate)}<i class="fas fa-flower" style="margin-left: 10px; color: #ff69b4; font-size: 0.8em;"></i>`;

                // Limpiar calendario anterior
                calendarDaysEl.innerHTML = '';
                weekdaysEl.innerHTML = '';
                
                // Renderizar días de la semana
                const weekdays = ['Dom', 'Lun', 'Mar', 'Mié', 'Jue', 'Vie', 'Sáb'];
                weekdays.forEach(day => {
                    const dayEl = document.createElement('div');
                    dayEl.className = 'weekday';
                    dayEl.textContent = day;
                    weekdaysEl.appendChild(dayEl);
                });

                const firstDayOfMonth = new Date(year, month, 1);
                const daysInMonth = new Date(year, month + 1, 0).getDate();
                const startDayIndex = firstDayOfMonth.getDay();

                // Días del mes anterior para rellenar
                const prevMonthDays = new Date(year, month, 0).getDate();
                for (let i = startDayIndex; i > 0; i--) {
                    const dayEl = document.createElement('div');
                    dayEl.className = 'calendar-day other-month';
                    dayEl.textContent = prevMonthDays - i + 1;
                    calendarDaysEl.appendChild(dayEl);
                }

                // Días del mes actual
                for (let i = 1; i <= daysInMonth; i++) {
                    const dayEl = document.createElement('div');
                    dayEl.className = 'calendar-day';
                    dayEl.textContent = i;
                    
                    const dayDate = new Date(year, month, i);
                    // Comprobar si este día está en un rango de periodo
                    for(const range of periodRanges) {
                        if (dayDate >= range.start && dayDate <= range.end) {
                            dayEl.classList.add('period');
                            break;
                        }
                    }
                    calendarDaysEl.appendChild(dayEl);
                }
                
                // Días del mes siguiente para rellenar
                const totalCells = calendarDaysEl.children.length;
                const nextDays = (7 - (totalCells % 7)) % 7;
                for (let i = 1; i <= nextDays; i++) {
                     const dayEl = document.createElement('div');
                     dayEl.className = 'calendar-day other-month';
                     dayEl.textContent = i;
                     calendarDaysEl.appendChild(dayEl);
                }
            };

            const fetchCycles = async (user) => {
                showLoading();
                
                const { data, error } = await supabase
                    .from('cycles')
                    .select('start_date, end_date')
                    .eq('user_id', user.id);

                if (error) {
                    console.error('Error fetching cycles:', error);
                    calendarDaysEl.innerHTML = '<div class="loading" style="color: #dc3545;"><i class="fas fa-exclamation-triangle"></i>Error al cargar los datos</div>';
                    return;
                }
                
                // Convertir fechas a objetos Date
                periodRanges = data.map(cycle => ({
                    start: new Date(cycle.start_date + 'T00:00:00'),
                    end: new Date(cycle.end_date + 'T00:00:00')
                }));

                renderCalendar();
            };

            // --- EVENTOS DE NAVEGACIÓN ---
            prevMonthBtn.addEventListener('click', () => {
                currentDate.setMonth(currentDate.getMonth() - 1);
                renderCalendar();
            });
            
            nextMonthBtn.addEventListener('click', () => {
                currentDate.setMonth(currentDate.getMonth() + 1);
                renderCalendar();
            });

            // --- CARGA INICIAL ---
            const { data: { user } } = await supabase.auth.getUser();
            if (user) {
                await fetchCycles(user);
            } else {
                calendarDaysEl.innerHTML = '<div class="login-prompt"><i class="fas fa-heart" style="color: #ff69b4; margin-right: 10px;"></i>Por favor, <a href="menu.html">inicia sesión</a> para ver tu calendario personalizado<i class="fas fa-heart" style="color: #ff69b4; margin-left: 10px;"></i></div>';
            }
        });
    </script>
</body>
</html>
